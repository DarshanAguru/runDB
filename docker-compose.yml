version: '3.8'

services:
  rundb:
    build:
      context: .
      dockerfile: dockerfile
    image: rundb:latest
    container_name: rundb-server
    ports:
      - "7379:7379"
    environment:
      - RUNDB_HOST=0.0.0.0
      - RUNDB_PORT=7379
      - RUNDB_MEMORY_LIMIT=10485760  # 10 MB Memory Limit
      - RUNDB_MAX_CLIENTS=10000
      - RUNDB_CRON_FREQ_INTERVAL=1.0
      - RUNDB_AOF_FILE=/data/run-master.aof
      - RUNDB_EVICTION_STRATEGY=allkeys-lru
      - RUNDB_EVICTION_RATIO=0.1
      - RUNDB_DB_COUNT=4
    volumes:
      # Named volume mapping to persist AOF data
      - rundb_data:/data
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  rundb_data:
    name: rundb_data
